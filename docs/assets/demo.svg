<svg xmlns="http://www.w3.org/2000/svg" width="760" height="420" viewBox="0 0 760 420" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <rect width="760" height="420" rx="10" fill="#0d1117"/>
  <rect width="760" height="34" rx="10" fill="#161b22"/>
  <circle cx="20" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="17" r="6" fill="#febc2e"/>
  <circle cx="60" cy="17" r="6" fill="#28c840"/>
  <text x="380" y="21" fill="#8b949e" text-anchor="middle">llmstxt-kit — generate · validate · diff</text>

  <text x="24" y="64" fill="#7ee787">$ llmstxt generate --full</text>
  <text x="24" y="86" fill="#c9d1d9">llms.txt: 4 sections, 10 links -&gt; llms.txt</text>
  <text x="24" y="106" fill="#c9d1d9">llms-full.txt: 10 pages, 761 words -&gt; llms-full.txt</text>

  <text x="24" y="140" fill="#7ee787">$ llmstxt validate llms.txt</text>
  <text x="24" y="162" fill="#c9d1d9">llms.txt: <tspan fill="#3fb950">OK</tspan> (0 errors, 0 warnings)</text>

  <text x="24" y="196" fill="#7ee787">$ llmstxt validate handwritten.txt</text>
  <text x="24" y="218" fill="#c9d1d9">handwritten.txt:5 <tspan fill="#f85149">error</tspan> E102 more than one H1 heading: "# Legacy"</text>
  <text x="24" y="238" fill="#c9d1d9">handwritten.txt:12 <tspan fill="#d29922">warning</tspan> W203 duplicate link URL: /guides/backup.md (first at line 8)</text>
  <text x="24" y="258" fill="#c9d1d9">handwritten.txt: <tspan fill="#f85149">FAIL</tspan> (1 error, 1 warning)</text>

  <text x="24" y="292" fill="#7ee787">$ llmstxt diff llms.txt llms.new.txt</text>
  <text x="24" y="314" fill="#c9d1d9">llms.txt files differ: 2 changes</text>
  <text x="24" y="334" fill="#c9d1d9">section "Getting started":</text>
  <text x="24" y="354" fill="#d29922">  ~ [Fast start](https://example.test/docs/getting-started/quickstart.md) title changed</text>
  <text x="24" y="374" fill="#c9d1d9">section "Optional":</text>
  <text x="24" y="394" fill="#f85149">  - [Glossary](https://example.test/docs/reference/glossary.md)</text>
</svg>
